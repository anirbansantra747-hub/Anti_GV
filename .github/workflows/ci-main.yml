name: '🚀 Production CI'

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: 'Full Quality Gate'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (strict)
        run: pnpm lint

      - name: Build all packages + apps
        run: pnpm build

      # Uncomment as you add tests:
      # - name: Unit tests
      #   run: pnpm test
      #
      # - name: Integration tests
      #   run: pnpm test:integration

